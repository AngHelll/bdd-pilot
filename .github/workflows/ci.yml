name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm run test:unit
      - run: npm run build
      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o bdd-pilot.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: bdd-pilot-vsix
          path: bdd-pilot.vsix

  sample-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore sample BDD project
        run: dotnet restore samples/minimal-bdd/MinimalBdd.csproj
      - name: Build sample BDD project
        run: dotnet build samples/minimal-bdd/MinimalBdd.csproj --no-restore
      - name: Run all sample tests
        run: dotnet test samples/minimal-bdd/MinimalBdd.csproj --no-build --verbosity normal
      - name: Smoke tag filter (Category=smoke)
        run: dotnet test samples/minimal-bdd/MinimalBdd.csproj --no-build --filter "Category=smoke" --verbosity minimal
      - name: Smoke feature filter (FullyQualifiedName~SmokeFeature)
        run: dotnet test samples/minimal-bdd/MinimalBdd.csproj --no-build --filter "FullyQualifiedName~SmokeFeature" --verbosity minimal

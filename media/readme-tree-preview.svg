<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-label="BDD Pilot test tree preview">
  <defs>
    <linearGradient id="sidebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252526"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="10" fill="#1e1e1e"/>
  <rect x="0" y="0" width="48" height="420" fill="#333333"/>
  <rect x="48" y="0" width="672" height="36" fill="#323233"/>
  <text x="64" y="23" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="12">samples/minimal-bdd  Visual Studio Code</text>

  <!-- Activity bar icon -->
  <circle cx="24" cy="56" r="14" fill="#007acc"/>
  <path d="M18 56 L24 50 L30 56 L27 56 L27 62 L21 62 L21 56 Z" fill="#ffffff"/>

  <!-- Sidebar -->
  <rect x="48" y="36" width="260" height="384" fill="url(#sidebar)"/>
  <text x="64" y="62" fill="#bbbbbb" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">BDD PILOT: TESTS</text>

  <!-- Status chips -->
  <rect x="64" y="74" width="52" height="18" rx="4" fill="#3c3c3c"/>
  <text x="72" y="87" fill="#4fc1ff" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STAGE test</text>
  <rect x="122" y="74" width="48" height="18" rx="4" fill="#3c3c3c"/>
  <text x="130" y="87" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="10">debug</text>

  <!-- Tree -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="12">
    <text x="64" y="118" fill="#cccccc">ľ Smoke</text>
    <text x="220" y="118" fill="#858585" font-size="10">2 tags</text>

    <text x="80" y="142" fill="#89d185"> System is ready</text>
    <text x="250" y="142" fill="#858585" font-size="10">15 ms</text>

    <text x="80" y="166" fill="#cccccc">ľ Add two numbers</text>

    <text x="96" y="190" fill="#89d185"> first=1, second=2, result=3</text>
    <text x="96" y="214" fill="#89d185"> first=5, second=7, result=12</text>

    <text x="64" y="248" fill="#858585" font-size="11">Run All · Refresh · Search</text>
  </g>

  <!-- Editor panel mock -->
  <rect x="308" y="36" width="412" height="384" fill="#1e1e1e" filter="url(#shadow)"/>
  <rect x="308" y="36" width="412" height="28" fill="#252526"/>
  <text x="320" y="54" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Smoke.feature</text>

  <g font-family="Consolas, Menlo, monospace" font-size="11">
    <text x="320" y="88" fill="#569cd6">@bdd-pilot-smoke</text>
    <text x="320" y="108" fill="#569cd6">Feature:</text><text x="390" y="108" fill="#cccccc"> Smoke</text>
    <text x="320" y="136" fill="#c586c0">  @smoke</text>
    <text x="320" y="156" fill="#569cd6">  Scenario:</text><text x="400" y="156" fill="#cccccc"> System is ready</text>
    <text x="320" y="176" fill="#4ec9b0">    Given</text><text x="370" y="176" fill="#cccccc"> the system is ready</text>
    <text x="320" y="196" fill="#4ec9b0">    Then</text><text x="360" y="196" fill="#cccccc"> the smoke check should succeed</text>

    <!-- CodeLens mock -->
    <rect x="320" y="202" width="220" height="16" rx="3" fill="#2d2d30"/>
    <text x="328" y="213" fill="#3794ff" font-size="10" font-family="Segoe UI, system-ui, sans-serif">Run · Debug</text>
  </g>

  <!-- Caption -->
  <text x="360" y="400" text-anchor="middle" fill="#858585" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Tree, CodeLens, and live results on samples/minimal-bdd</text>
</svg>
